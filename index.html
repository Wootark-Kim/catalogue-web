<!doctype html>
<html>
    <head>
        <title>LA TV Shows | Home</title>
        <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
        <link rel="stylesheet" href="style.css" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    </head>

    <!-- [BODY]===================================================================================================== -->

    <body>
        <header class="main-header">
            <h1 class="title">Spaceship Compendium</h1>

            <div id="header-description">
                From the debuted "Callisto" in 1893 to the fantastical imaginings of modern films such as Star Wars and Avatar,
                explore the creative vehicles of space explorations!
            </div>

            <div id="filter-area">
                <div class="filter-type">
                    <label for="selectIP"> Filter by IP </label>
                    <select id="selectIP">
                        <option> show all IPs </option>
                        <!-- gets autopopulated by the uniqueIP function -->
                    </select>
                </div>

                <div class="filter-type">
                    <label for="selectSize"> Order by Size </label>
                    <select id="selectSize">
                        <option> smallest to largest </option>
                        <option> largest to smallest </option>
                    </select>
                </div>

                <div class="filter-type">
                    <label for="selectFavorite">Filter by Favorite</label>
                    <select id="selectFavorite">
                        <option> Show all catalogue </option>
                        <option> Show only favorites </option>
                    </select>
                </div>
            </div>
        </header>

        <div id="card-container">

        </div>

        <div class="card" style="display: none">

            <div class="card-content">
                <h2>TV Show Title</h2>

                <img src="" alt="Picture of Ship" />

                <ul>
                    <li id="ip"></li>
                    <li id="faction"></li>
                    <li id="sizeLengthMeters"></li>
                </ul>

                <button class="save-button"> + </button>
            </div>
        </div>

        <div class="footer">
            <button onclick="quoteAlert()">Get A Quote!</button>
            <button onclick="removeLastCard()">Remove A Card!</button>
        </div>

        <script type="text/javascript" src="scripts.js"></script>
    </body>
</html>
